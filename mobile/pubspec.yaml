name: design_vallet
description: "Production-ready mobile application for Design Vallet Image Marketplace."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State & Routing
  provider: ^6.1.1
  supabase_flutter: ^2.2.0

  # API & Security
  http: ^1.2.0
  flutter_secure_storage: ^9.0.0
  flutter_jailbreak_detection: ^1.1.0 # Root Detection

  # Payments
  razorpay_flutter: ^1.3.5

  # Storage & Files
  path_provider: ^2.1.1
  open_file: ^3.3.2

  # Social Login
  google_sign_in: ^6.2.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.jpg
